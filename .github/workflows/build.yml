name: build

on:
  push:
  pull_request:

jobs:
  pio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Provide secrets.ini placeholders
        # Real secrets are not needed at build time; the firmware only reads
        # them at runtime. Copying the example unblocks the #error guards.
        run: cp secrets.example.ini secrets.ini

      - name: Build cuve-emitter (mains/dev)
        run: pio run -e cuve-emitter

      - name: Build cuve-emitter-battery
        run: pio run -e cuve-emitter-battery

      - name: Build prises-actuator
        run: pio run -e prises-actuator

      - name: Build prises-actuator-dx-lr30 (STM32)
        run: pio run -e prises-actuator-dx-lr30

      - name: Build gateway
        run: pio run -e gateway
