; Monorepo: two firmwares (cuve-emitter, gateway) share this platformio.ini.
; Hardware: 2x LILYGO LoRa32 T3 V1.6.1, identical. Role is selected by env.
; src_dir = . so we can keep cuve-emitter/ and gateway/ at the root.
; build_src_filter selects the right subfolder per env.
; Future emitters (e.g. meteo-emitter) would each get their own folder + env.

[platformio]
src_dir = .
default_envs = cuve-emitter
; secrets.ini must exist (cp secrets.example.ini secrets.ini then edit).
; It provides the [wifi] and [mqtt] sections referenced below.
extra_configs = secrets.ini

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
lib_deps =
    sandeepmistry/LoRa @ ^0.8.0
    bblanchon/ArduinoJson @ ^7.0.0
    knolleary/PubSubClient @ ^2.8
    olikraus/U8g2 @ ^2.34.0
build_flags =
    ; LoRa pins LILYGO T3 V1.6.1 (verified on silkscreen + LILYGO docs).
    -DLORA_SCK=5
    -DLORA_MISO=19
    -DLORA_MOSI=27
    -DLORA_SS=18
    -DLORA_RST=23
    -DLORA_DIO0=26
    -DLORA_BAND=868100000UL
    ; OLED SSD1306 0.96" built into LILYGO T3 V1.6.1 (I2C).
    -DOLED_SDA=21
    -DOLED_SCL=22
    -DOLED_RST=16

; --- Tank emitter (garden): LILYGO LoRa32 T3 V1.6.1 ----------------------
[env:cuve-emitter]
board = esp32dev
build_src_filter = -<*> +<cuve-emitter/src/>
lib_deps =
    ${env.lib_deps}
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^3.11.0
build_flags =
    ${env.build_flags}
    ${lora.build_flags}
    -DROLE_EMITTER=1
    -DNODE_ID=\"cuve\"
    -DWITH_OLED=1
    ; Default TX cadence at first power-up. Subsequent boots use the value
    ; saved in NVS (pushed by the gateway via the HA "Cuve TX interval" slider).
    -DTX_INTERVAL_S_DEFAULT=60
    ; Set to 1 for battery/solar deployment: the emitter does one TX cycle
    ; per setup() then enters esp_deep_sleep until the next interval.
    -DWITH_DEEP_SLEEP=0
    ; DS18B20 1-Wire DATA pin (with external 4.7k pull-up to VDD).
    -DTEMP_PIN=13

; --- Gateway (house): LILYGO LoRa32 T3 V1.6.1 ----------------------------
[env:gateway]
board = esp32dev
build_src_filter = -<*> +<gateway/src/>
build_flags =
    ${env.build_flags}
    ${wifi.build_flags}
    ${mqtt.build_flags}
    ${lora.build_flags}
    -DROLE_GATEWAY=1
    -DMQTT_BASE_TOPIC=\"jardin\"
    -DMQTT_CLIENT_ID=\"jardin-gateway\"
    -DWITH_OLED=1
    ; Deployment-specific calibration (semantic). Reflash here, not the emitter.
    -DTANK_EMPTY_DISTANCE_CM=80
    -DTANK_FULL_DISTANCE_CM=5
