; Monorepo: multiple firmwares share this platformio.ini.
; Hardware: 2x LILYGO LoRa32 T3 V1.6.1 (ESP32) + 1x DX-LR30 (STM32F103). Role is selected by env.
; src_dir = . so we can keep cuve-emitter/ and gateway/ at the root.
; build_src_filter selects the right subfolder per env.
; Future emitters (e.g. meteo-emitter) would each get their own folder + env.

[platformio]
src_dir = .
default_envs = cuve-emitter
; secrets.ini must exist (cp secrets.example.ini secrets.ini then edit).
; It provides the [wifi] and [mqtt] sections referenced below.
extra_configs = secrets.ini

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
lib_deps =
    jgromes/RadioLib @ ~7.0.0
    bblanchon/ArduinoJson @ ~7.0.0
    knolleary/PubSubClient @ ~2.8
    olikraus/U8g2 @ ~2.34.0
build_flags =
    -DLORA_BAND=868100000UL
    ; Private sync word: filters generic LoRa traffic at the radio layer.
    ; Must match between emitter and gateway. Not a security primitive
    ; (HMAC handles auth); just a co-existence filter.
    -DLORA_SYNC_WORD=0x34

; Board-specific pin sets referenced by individual envs.
[lilygo]
; LILYGO LoRa32 T3 V1.6.1 (verified on silkscreen + LILYGO docs).
build_flags =
    -DLORA_SCK=5
    -DLORA_MISO=19
    -DLORA_MOSI=27
    -DLORA_SS=18
    -DLORA_RST=23
    -DLORA_DIO0=26
    ; OLED SSD1306 0.96" built-in (I2C). RST=16 exists on the PCB but must NOT
    ; be pulsed by software: touching GPIO16 resets the chip on some variants.
    ; U8g2 uses U8X8_PIN_NONE; OLED_RST_PULSE_PIN is deliberately left undefined.
    -DOLED_SDA=21
    -DOLED_SCL=22
    -DOLED_RST=16

[heltec_v3]
; Heltec WiFi LoRa 32 V3 / ARCELI LoRa ESP V3 (ESP32-S3 + SX1262).
; Internal connections verified from board silkscreen and pin-detail diagram.
build_flags =
    -DLORA_USE_SX1262=1
    -DLORA_SCK=9
    -DLORA_MISO=11
    -DLORA_MOSI=10
    -DLORA_SS=8
    -DLORA_DIO1=14
    -DLORA_RST=12
    -DLORA_BUSY=13
    ; OLED SSD1306 0.96" built-in (I2C). RST=GPIO21, no PCB pull-up, must be
    ; driven HIGH before I2C probe or the display stays in reset.
    -DOLED_SDA=17
    -DOLED_SCL=18
    -DOLED_RST_PULSE_PIN=21
    ; Vext (GPIO36 active-low) powers the OLED panel. Without it the I2C
    ; controller responds but pixels stay off.
    -DOLED_VEXT_PIN=36
    -DOLED_PORTRAIT=1
    -DVBAT_PIN=1
    -DLED_PIN=35
    ; SX1262 on Heltec V3 uses a TCXO powered via DIO3. Without this,
    ; SetDio3AsTcxoCtrl is skipped, the TCXO stays unpowered, and TX fails.
    -DLORA_TCXO_VOLTAGE=1.8

; --- Tank emitter (garden): LILYGO LoRa32 T3 V1.6.1, battery/solar -------
; One TX cycle per setup() then deep-sleeps until the next interval.
; OLED lights up for oled_display_ms (HA-configurable) on every wake.
[env:cuve-emitter]
board = esp32dev
build_src_filter = -<*> +<cuve-emitter/src/>
lib_deps =
    ${env.lib_deps}
    paulstoffregen/OneWire @ ~2.3.7
    milesburton/DallasTemperature @ ~3.11.0
    h2zero/NimBLE-Arduino @ ~1.4.0
build_flags =
    ${env.build_flags}
    ${lilygo.build_flags}
    ${lora.build_flags}
    -DWITH_FLOWERCARE=1
    -DROLE_EMITTER=1
    -DNODE_ID=\"cuve\"
    -DWITH_OLED=1
    -DWITH_DEEP_SLEEP=1
    ; Default TX cadence at first power-up. Subsequent boots use the value
    ; saved in NVS (pushed by the gateway via the HA "Cuve TX interval" slider).
    -DTX_INTERVAL_S_DEFAULT=180
    ; DS18B20 1-Wire DATA pin (with external 4.7k pull-up to VDD).
    -DTEMP_PIN=13

; --- Cuve emitter: US debug (continuous distance loop, no LoRa/BLE/sleep) --
[env:cuve-emitter-debug-us]
board = esp32dev
build_src_filter = -<*> +<cuve-emitter/src/>
lib_deps =
    ${env.lib_deps}
    paulstoffregen/OneWire @ ~2.3.7
    milesburton/DallasTemperature @ ~3.11.0
build_flags =
    ${env.build_flags}
    ${lilygo.build_flags}
    -DROLE_EMITTER=1
    -DNODE_ID=\"cuve\"
    -DDEBUG_US=1
    -DWITH_OLED=1
    -DTEMP_PIN=13

; --- Relay actuator (garden): LILYGO LoRa32 T3 V1.6.1 --------------------
; Controls a 2-channel 5V relay module. Receives commands over LoRa from the
; gateway, persists relay state across reboots, sends periodic heartbeats.
[env:prises-actuator]
board = esp32dev
build_src_filter = -<*> +<prises-actuator/src/>
build_flags =
    ${env.build_flags}
    ${lilygo.build_flags}
    ${lora.build_flags}
    -DROLE_ACTUATOR=1
    -DNODE_ID=\"prises\"
    -DWITH_OLED=1
    ; TX heartbeat cadence (s). Relay commands always trigger an immediate TX.
    -DTX_INTERVAL_S=60
    ; GPIO for IN1/IN2 on the relay module. GPIO 32+33: no strapping, no LoRa conflict.
    -DRELAY1_PIN=32
    -DRELAY2_PIN=33
    ; Set to 0 if your relay module uses active-HIGH logic.
    -DRELAY_ACTIVE_LOW=1

; --- Relay actuator: ARCELI LoRa ESP V3 (ESP32-S3 + SX1262) ---------------
; Heltec WiFi LoRa 32 V3 compatible clone. Same firmware as prises-actuator,
; different pinout. Relay pins use GPIO4+GPIO5 by default — adjust to match
; your wiring (any free GPIO exposed on the J2/J3 headers works).
[env:prises-actuator-arceli]
board = heltec_wifi_lora_32_V3
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
build_src_filter = -<*> +<prises-actuator/src/>
build_flags =
    ${env.build_flags}
    ${heltec_v3.build_flags}
    ${lora.build_flags}
    -DROLE_ACTUATOR=1
    -DNODE_ID=\"prises\"
    -DWITH_OLED=1
    -DTX_INTERVAL_S=60
    -DRELAY1_PIN=4
    -DRELAY2_PIN=5
    -DRELAY_ACTIVE_LOW=0

; --- Relay actuator: DX-LR30 (STM32F103C8T6 + SX1262) --------------------
; Functionally identical to prises-actuator but targets the DX-LR30 module.
; Pinout verified from the development board manual image:
;   SPI1: SCK=PA5, MISO=PA6, MOSI=PA7 (SPI.begin() defaults, not overridden)
;   SX1262 control: NSS=PA4, DIO1=PC15, RST=PA15, BUSY=PA14
;   RF switch: TXEN=PA0, RXEN=PA1 (DX-LR30 uses an external PA/switch)
;   PA14=JTCK: JTAG must be disabled in firmware before using it as BUSY.
[env:prises-actuator-dx-lr30]
platform = ststm32
board = genericSTM32F103C8
framework = arduino
monitor_speed = 115200
upload_protocol = serial
upload_port = /dev/cu.wchusbserial110
monitor_rts = 0
monitor_dtr = 0
; stm32flash -i alone is unreliable: the GPIO sequence runs but the bootloader
; handshake fails intermittently. stm32_upload_reset.py (pyserial) opens the
; port, asserts the correct DTR/RTS polarity for NRST/BOOT0, and closes it so
; stm32flash can then connect cleanly without -i.
extra_scripts = pre:stm32_upload_reset.py
upload_flags =
build_src_filter = -<*> +<prises-actuator-dx-lr30/src/>
lib_deps =
    jgromes/RadioLib @ ~7.0.0
    bblanchon/ArduinoJson @ ~7.0.0
    rweather/Crypto
; SubGhz is the STM32WL internal LoRa peripheral library; irrelevant on F103.
lib_ignore = SubGhz
build_flags =
    ${lora.build_flags}
    -DROLE_ACTUATOR=1
    -DNODE_ID=\"prises\"
    -DLORA_USE_SX1262=1
    ; Exclude RadioLib's STM32WLx module (internal radio on STM32WL series).
    ; Not available on STM32F103 and causes compile errors.
    -DRADIOLIB_EXCLUDE_STM32WLX=1
    -DLORA_BAND=868100000UL
    -DLORA_SYNC_WORD=0x34
    ; DX-LR30 SX1262 pin mapping (verified from board manual).
    -DLORA_SS=PA4
    -DLORA_DIO1=PC15
    -DLORA_RST=PA15
    -DLORA_BUSY=PA14
    ; RF switch on the DX-LR30: external amplifier controlled by TXEN/RXEN.
    -DLORA_TXEN=PA0
    -DLORA_RXEN=PA1
    ; SX1262 on the DX-LR30 uses a TCXO (DIO3 as control). Without this,
    ; RF calibration fails with -707 (SPI_CMD_FAILED) because the oscillator
    ; isn't enabled before calibration runs.
    ; DX-LR30 uses a 32 MHz crystal (XOSC) on XTA/XTB, NOT a TCXO on DIO3.
    ; Do NOT set LORA_TCXO_VOLTAGE: it would call SetDio3AsTcxoCtrl and disconnect
    ; the crystal from the oscillator mux, causing every SetTx to fail CMD_FAILED.
    ; Relay GPIO outputs. Both channels active-HIGH.
    -DRELAY1_PIN=PB3
    -DRELAY2_PIN=PB4
    -DRELAY1_ACTIVE_LOW=0
    -DRELAY2_ACTIVE_LOW=0
    -DVBAT_PIN=PA3
    -DLED_PIN=PC13
    -DSERIAL_UART_INSTANCE=1
    -DPIN_SERIAL_TX=PA9
    -DPIN_SERIAL_RX=PA10
    -DTX_INTERVAL_S=60
    ; GODMODE: expose Module::gpioPin so we can switch to NC after init.
    ; Required for the PA14=DIO3 diagnostic: init with real BUSY (proper
    ; reset timing), then switch gpioPin=RADIOLIB_NC before TX so DIO3
    ; going HIGH in TX mode doesn't block SPI.
    -DRADIOLIB_GODMODE=1

; --- Flower Care BLE reader: LILYGO LoRa32 T3 V1.6.1 ---------------------
; Polls a HHCC JCY01HHCC plant sensor every 10 s over BLE and shows
; temperature, moisture, light, conductivity, and battery on the OLED.
; No LoRa, no MQTT, no auth — standalone experiment.
; Set FLOWERCARE_MAC to the target device's MAC (visible via nRF Connect).
[env:flower-care-ble]
board = esp32dev
build_src_filter = -<*> +<flower-care-ble/src/>
lib_deps =
    h2zero/NimBLE-Arduino @ ~1.4.0
    olikraus/U8g2 @ ~2.34.0
build_flags =
    ${flowercare.build_flags}
    -DWITH_OLED=1
    -DOLED_SDA=21
    -DOLED_SCL=22

; --- Gateway (house): LILYGO LoRa32 T3 V1.6.1 ----------------------------
[env:gateway]
board = esp32dev
upload_port = /dev/cu.wchusbserial58F00048451
build_src_filter = -<*> +<gateway/src/>
build_flags =
    ${env.build_flags}
    ${lilygo.build_flags}
    ${wifi.build_flags}
    ${mqtt.build_flags}
    ${lora.build_flags}
    -DROLE_GATEWAY=1
    -DMQTT_BASE_TOPIC=\"jardin\"
    -DMQTT_CLIENT_ID=\"jardin-gateway\"
    -DWITH_OLED=1
    -DACTUATOR_NODE_ID=\"prises\"
    ; Deployment-specific calibration (semantic). Reflash here, not the emitter.
    -DTANK_EMPTY_DISTANCE_CM=100
    -DTANK_FULL_DISTANCE_CM=0
