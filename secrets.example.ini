; Copy this file to `secrets.ini` (gitignore) then fill in.
; Without `secrets.ini`, the build fails with a clear message.

[wifi]
build_flags =
    -DWIFI_SSID=\"REPLACE_ME\"
    -DWIFI_PASSWORD=\"REPLACE_ME\"

[mqtt]
build_flags =
    -DMQTT_HOST=\"REPLACE_ME\"
    -DMQTT_PORT=1883
    -DMQTT_USER=\"\"
    -DMQTT_PASSWORD=\"\"

; Pre-shared LoRa key for HMAC-SHA256 (auth + anti-replay).
; Must be IDENTICAL between emitter and gateway. Generate via:
;   openssl rand -hex 32   (or any random string)
[lora]
build_flags =
    -DLORA_PSK=\"REPLACE_ME_WITH_RANDOM_HEX\"
